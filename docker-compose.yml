version: "3.8"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: coastalcred-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: coastalcred
      POSTGRES_USER: coastalcred
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coastalcred_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coastalcred"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
